; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:stm32f302r8]
platform = ststm32
board = nucleo_f302r8
framework = cmsis

upload_protocol = stlink
debug_tool = stlink

monitor_speed = 115200

board_build.cpu = cortex-m4
board_build.f_cpu = 72000000L

build_src_filter =  +<*> -<Drivers/soc/STM32C0xx/**/*.c>
                         -<Drivers/soc/STM32F0xx/**/*.c>
                         -<Drivers/soc/STM32F1xx/**/*.c>
                         -<Drivers/soc/STM32F2xx/**/*.c>
                         -<Drivers/soc/STM32F4xx/**/*.c>
                         -<Drivers/soc/STM32F7xx/**/*.c>
                         -<Drivers/soc/STM32G0xx/**/*.c>
                         -<Drivers/soc/STM32G4xx/**/*.c>
                         -<Drivers/soc/STM32H5xx/**/*.c>
                         -<Drivers/soc/STM32H7xx/**/*.c>
                         -<Drivers/soc/STM32H7RSxx/**/*.c>
                         -<Drivers/soc/STM32L0xx/**/*.c>
                         -<Drivers/soc/STM32L1xx/**/*.c>
                         -<Drivers/soc/STM32L4xx/**/*.c>
                         -<Drivers/soc/STM32L5xx/**/*.c>
                         -<Drivers/soc/STM32U0xx/**/*.c>
                         -<Drivers/soc/STM32U5xx/**/*.c>
                         -<Drivers/soc/STM32WBAxx/**/*.c>
                         -<Drivers/soc/STM32WBxx/**/*.c>
                         -<Drivers/soc/STM32WLxx/**/*.c>
                         -<Drivers/soc/TM4C1294/**/*.c>
                         -<NeonRTOS/kernel/portable/GCC/ARM_CM0/*.c>
                         -<NeonRTOS/kernel/portable/GCC/ARM_CM3/*.c>
                         -<NeonRTOS/kernel/portable/GCC/ARM_CM7/*.c>

build_flags =
    -DUSE_HAL_DRIVER
    -DUSE_FULL_LL_DRIVER
    -DCLOCK_SOURCE=USE_PLL_HSE_XTAL
    -UHAL_CAN_MODULE_ENABLED          ; 禁用新 CAN 模組
    -DUSE_HAL_CAN_LEGACY              ; 啟用 Legacy CAN 模組
    -DUS_TICKER_PERIOD_NUM=1
    -DUS_TICKER_PERIOD_DEN=1
    -DLP_TICKER_PERIOD_NUM=1
    -DLP_TICKER_PERIOD_DEN=1
    -DTARGET_CORTEX_M
    -DMBED_CONF_TARGET_RTC_CLOCK_SOURCE=USE_RTC_CLK_LSI
    -DCONFIG_RTOS_HEAP_SIZE=10*1024
    -mcpu=cortex-m4
    -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Isrc/OS
# 添加 Drivers 头文件路径
    -Isrc/Drivers
    -Isrc/Drivers/soc
    -Isrc/Drivers/soc/STM32F3xx
# 添加 Driver 头文件路径
    -Isrc/W-Link
    -Isrc/W-Link/Driver
# 添加 NeonRTOS 头文件路径
    -Isrc/NeonRTOS
    -Isrc/NeonRTOS/kernel/include
    -Isrc/NeonRTOS/kernel/portable/GCC/ARM_CM4F

