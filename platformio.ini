[env:rp2350]
platform = file://platforms/platform-neon-pico
board = rp2350
board_dir = ./boards
framework = pico-sdk

upload_protocol = uf2
debug_tool = cmsis-dap

monitor_speed = 115200

board_build.cpu = cortex-m33
board_build.f_cpu = 150000000L

build_src_filter =
    +<*>
    -<Drivers/soc/STM32C0xx/**/*.c>
    -<Drivers/soc/STM32F0xx/**/*.c>
    -<Drivers/soc/STM32F1xx/**/*.c>
    -<Drivers/soc/STM32F2xx/**/*.c>
    -<Drivers/soc/STM32F3xx/**/*.c>
    -<Drivers/soc/STM32F4xx/**/*.c>
    -<Drivers/soc/STM32F7xx/**/*.c>
    -<Drivers/soc/STM32G0xx/**/*.c>
    -<Drivers/soc/STM32G4xx/**/*.c>
    -<Drivers/soc/STM32H5xx/**/*.c>
    -<Drivers/soc/STM32H7xx/**/*.c>
    -<Drivers/soc/STM32H7RSxx/**/*.c>
    -<Drivers/soc/STM32L0xx/**/*.c>
    -<Drivers/soc/STM32L1xx/**/*.c>
    -<Drivers/soc/STM32L4xx/**/*.c>
    -<Drivers/soc/STM32L5xx/**/*.c>
    -<Drivers/soc/STM32U0xx/**/*.c>
    -<Drivers/soc/STM32U5xx/**/*.c>
    -<Drivers/soc/STM32WBAxx/**/*.c>
    -<Drivers/soc/STM32WBxx/**/*.c>
    -<Drivers/soc/STM32WLxx/**/*.c>
    -<Drivers/soc/TM4C1294/**/*.c>
    -<NeonRTOS/kernel/portable/MemMang/*.c>
    -<NeonRTOS/kernel/portable/GCC/ARM_CM0/*.c>
    -<NeonRTOS/kernel/portable/GCC/ARM_CM3/*.c>
    -<NeonRTOS/kernel/portable/GCC/ARM_CM4F/*.c>
    -<NeonRTOS/kernel/portable/GCC/ARM_CM7/*.c>
    -<W-Link/*/*.c>

build_flags =
    -DPICO_ON_DEVICE=1
    -DTARGET_CORTEX_M
    -DconfigENABLE_TRUSTZONE=1
    -DconfigENABLE_MPU=0
    -DconfigENABLE_FPU=1
    -DCONFIG_RTOS_HEAP_SIZE=1024
    -Wl,--no-warn-mismatch
    -Isrc/OS
    -Isrc/Drivers
    -Isrc/Drivers/soc
    -Isrc/Drivers/soc/RP2350
    -Isrc/W-Link
    -Isrc/W-Link/Driver
    -Isrc/NeonRTOS
    -Isrc/NeonRTOS/kernel/include
    -Isrc/NeonRTOS/kernel/portable/GCC/ARM_CM33/non_secure
    -Isrc/NeonRTOS/kernel/portable/GCC/ARM_CM33/secure

